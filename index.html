<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f3ed" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1512" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Training" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>Training</title>
    <script>
      // Basecoat switches themes via a .dark class on <html>; mirror the OS
      // preference (runs before CSS paints to avoid a light-mode flash).
      const dark = matchMedia('(prefers-color-scheme: dark)')
      const applyTheme = () => document.documentElement.classList.toggle('dark', dark.matches)
      applyTheme()
      dark.addEventListener('change', applyTheme)
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
